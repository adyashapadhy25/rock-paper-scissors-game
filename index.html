<!DOCTYPE html>
<html>

<head>
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Rock Paper Scissors Game</h1>

<div class="scoreboard">
<p>You: <span id="userScore">0</span></p>
<p>Computer: <span id="compScore">0</span></p>
</div>

<div class="choices">

<button onclick="play('rock')" class="choice">🪨</button>
<button onclick="play('paper')" class="choice">📄</button>
<button onclick="play('scissor')" class="choice">✂️</button>

</div>

<div id="result">Make your move!</div>

<script src="script.js"></script>

</body>

</html>
